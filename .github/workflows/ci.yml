name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Scan publishable files for secrets and private data
        run: python skills/industry-morning-report/scripts/privacy_scan.py .

