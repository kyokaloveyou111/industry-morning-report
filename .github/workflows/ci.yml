name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Scan publishable files for secrets and private data
        run: python .agents/skills/industry-morning-report-maintainer/scripts/privacy_scan.py . --history
